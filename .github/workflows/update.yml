name: Refresh coaching dashboard

on:
  # 9:00 UTC weekdays = 5:00 EDT (4:00 EST during winter)
  schedule:
    - cron: "0 9 * * 1-5"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Pull fresh data and rewrite index.html
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-haiku-4-5-20251001' }}
        run: python scripts/refresh_dashboard.py

      - name: Commit and push if index.html changed
        id: commit
        run: |
          git config user.name "nee-coaching-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet -- index.html; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add index.html
          git commit -m "Refresh dashboard data $(date -u +'%Y-%m-%d %H:%MZ')"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        if: ${{ steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::Cloudflare secrets not set - skipping Pages deploy"
            exit 0
          fi
          npx -y wrangler@latest pages deploy . \
            --project-name=nee-coaching \
            --branch=main \
            --commit-dirty=true
