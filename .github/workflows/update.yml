name: Refresh coaching dashboard

on:
  # 9:00 UTC weekdays = 5:00 EDT (4:00 EST during winter)
  schedule:
    - cron: "0 9 * * 1-5"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Pull fresh data and rewrite index.html
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/refresh_dashboard.py

      - name: Commit and push if index.html changed
        run: |
          git config user.name "nee-coaching-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet -- index.html; then
            echo "No changes to commit."
            exit 0
          fi
          git add index.html
          git commit -m "Refresh dashboard data $(date -u +'%Y-%m-%d %H:%MZ')"
          git push
